        /* NAVBAR */
        
        .navbar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: linear-gradient(90deg, #0f2027, #203a43, #2c5364);
        }
        
        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 2px;
            position: relative;
        }
        
        .navbar a::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: cyan;
            transition: 0.3s;
        }
        
        .navbar a:hover::after {
            width: 100%;

        /* MOVING BACKGROUND */
        /* MOVING BACKGROUND */
        
        .moving-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .moving-bg img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: bgFade 90s infinite;
        }
        /* 6 seconds per image */
        
        .moving-bg img:nth-child(1) {
            animation-delay: 0ms;
        }
        
        .moving-bg img:nth-child(2) {
            animation-delay: 9s;
        }
        
        .moving-bg img:nth-child(3) {
            animation-delay: 18s;
        }
        
        .moving-bg img:nth-child(4) {
            animation-delay: 27s;
        }
        
        .moving-bg img:nth-child(5) {
            animation-delay: 36s;
        }
        
        .moving-bg img:nth-child(6) {
            animation-delay: 45s;
        }
        
        .moving-bg img:nth-child(7) {
            animation-delay: 54s;
        }
        
        .moving-bg img:nth-child(8) {
            animation-delay: 63s;
        }
        
        .moving-bg img:nth-child(9) {
            animation-delay: 72s;
        }
        
        .moving-bg img:nth-child(10) {
            animation-delay: 81s;
        }
        
        .moving-bg img:nth-child(11) {
            animation-delay: 90s;
        }
        
        .moving-bg img:nth-child(12) {
            animation-delay: 99s;
        }
        
        .moving-bg img:nth-child(13) {

        }
        
        .moving-bg img:nth-child(14) {
            animation-delay: 117s;
        }
        
        .moving-bg img:nth-child(15) {
            animation-delay: 226s;
        }
        
        @keyframes bgFade {
            0% {
                opacity: 1;
            }
            8% {
                opacity: 1;
            }
            /* fade in */
            40% {
                opacity: 1;
            }
            /* stay */
            48% {
                opacity: 0;
            }
            /* fade out */
            100% {
                opacity: 0;
            }
        }

        .booking-box button {
